schema_version: 1

context:
  name: de-entgeltatlas
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/de-entgeltatlas-${{ version }}.tar.gz
  sha256: 1c09fc589cf5343242c5771fc50da83748a29d90107bd71c03ede12b0636ad5b

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry
  run:
    - python >=${{ python_min }}
    - python-dateutil
    - urllib3 >=1.25.3

tests:
  - python:
      imports:
        - deutschland.entgeltatlas
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Arbeitsagentur Entgeltatlas API
  license: Apache-2.0
  license_file:
    - LICENSE
  homepage: https://github.com/bundesAPI/entgeltatlas-api

extra:
  recipe-maintainers:
    - jan-janssen
